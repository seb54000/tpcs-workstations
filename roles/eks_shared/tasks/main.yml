---
- name: Define EKS shared vars
  ansible.builtin.set_fact:
    eks_clusters_map: "{{ tf_vars.eks_clusters.value | default({}) }}"
    student_usernames: "{{ ((users_list if users_list is mapping else (users_list | from_json)).keys() | list | sort) }}"
    eks_admin_kubeconfig_path: /root/.kube/config.eks.bootstrap
    eks_token_cache_path: /root/.kube/eks_tokens_cache.json
    eks_force_rotate_tokens: "{{ (lookup('env','EKS_FORCE_ROTATE_TOKENS') | default('false') | lower) in ['1','true','yes'] }}"

- name: Install kubectl snap package
  community.general.snap:
    name: kubectl
    state: present
    classic: true
  when: eks_clusters_map | length > 0

- name: Ensure bootstrap kubeconfig directory exists
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    owner: root
    group: root
    mode: '0700'
  when: eks_clusters_map | length > 0

- name: Check if token cache exists
  ansible.builtin.stat:
    path: "{{ eks_token_cache_path }}"
  register: eks_token_cache_stat
  when: eks_clusters_map | length > 0

- name: Read token cache
  ansible.builtin.slurp:
    src: "{{ eks_token_cache_path }}"
  register: eks_token_cache_slurp
  when:
    - eks_clusters_map | length > 0
    - eks_token_cache_stat.stat.exists

- name: Decode token cache
  ansible.builtin.set_fact:
    eks_token_cache_raw: "{{ (eks_token_cache_slurp.content | b64decode | from_json) if (eks_token_cache_stat.stat.exists | default(false)) else {} }}"
  when: eks_clusters_map | length > 0
  no_log: true

- name: Initialize token maps from cache
  ansible.builtin.set_fact:
    eks_student_tokens: "{{ eks_token_cache_raw.student_tokens | default({}) }}"
    eks_admin_tokens: "{{ eks_token_cache_raw.admin_tokens | default({}) }}"
  when: eks_clusters_map | length > 0
  no_log: true

- name: Reset temporary admin kubeconfig
  ansible.builtin.file:
    path: "{{ eks_admin_kubeconfig_path }}"
    state: absent
  when: eks_clusters_map | length > 0

- name: Build admin kubeconfig contexts for all EKS clusters
  ansible.builtin.command: >-
    aws eks update-kubeconfig
    --region {{ item.value.region }}
    --name {{ item.value.cluster_name }}
    --alias {{ item.key }}
    --kubeconfig {{ eks_admin_kubeconfig_path }}
  loop: "{{ eks_clusters_map | dict2items }}"
  changed_when: false
  when: eks_clusters_map | length > 0

- name: Ensure trainer cluster-admin serviceaccount exists on each EKS cluster
  ansible.builtin.shell: |
    cat <<'EOF_MANIFEST' | kubectl --kubeconfig "{{ eks_admin_kubeconfig_path }}" --context "{{ cluster_alias }}" apply -f -
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: tpcs-cluster-admin
      namespace: kube-system
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: tpcs-cluster-admin-binding
    subjects:
    - kind: ServiceAccount
      name: tpcs-cluster-admin
      namespace: kube-system
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: cluster-admin
    EOF_MANIFEST
  args:
    executable: /bin/bash
  loop: "{{ eks_clusters_map | dict2items }}"
  vars:
    cluster_alias: "{{ item.key }}"
  changed_when: false
  when: eks_clusters_map | length > 0

- name: Create namespace, serviceaccount and namespace-admin rolebinding for each student on each EKS cluster
  ansible.builtin.shell: |
    cat <<'EOF_MANIFEST' | kubectl --kubeconfig "{{ eks_admin_kubeconfig_path }}" --context "{{ cluster_alias }}" apply -f -
    apiVersion: v1
    kind: Namespace
    metadata:
      name: {{ student_name }}
    ---
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: {{ student_name }}
      namespace: {{ student_name }}
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      name: {{ student_name }}-admin
      namespace: {{ student_name }}
    subjects:
    - kind: ServiceAccount
      name: {{ student_name }}
      namespace: {{ student_name }}
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: admin
    EOF_MANIFEST
  args:
    executable: /bin/bash
  loop: "{{ (eks_clusters_map | dict2items) | product(student_usernames) | list }}"
  loop_control:
    label: "{{ item.0.key }} / {{ item.1 }}"
  vars:
    cluster_alias: "{{ item.0.key }}"
    student_name: "{{ item.1 }}"
  changed_when: false
  when: eks_clusters_map | length > 0

- name: Create missing student serviceaccount tokens for each EKS cluster
  ansible.builtin.command: >-
    kubectl --kubeconfig {{ eks_admin_kubeconfig_path }}
    --context {{ item.0.key }}
    -n {{ item.1 }}
    create token {{ item.1 }} --duration=720h
  loop: "{{ (eks_clusters_map | dict2items) | product(student_usernames) | list }}"
  loop_control:
    label: "{{ item.0.key }} / {{ item.1 }}"
  register: eks_student_tokens_new_raw
  no_log: true
  when:
    - eks_clusters_map | length > 0
    - eks_force_rotate_tokens or ((eks_student_tokens[item.1] | default({}))[item.0.key] | default('') == '')

- name: Merge newly generated student tokens into map
  ansible.builtin.set_fact:
    eks_student_tokens: >-
      {{
        eks_student_tokens | combine(
          {
            current_student: (eks_student_tokens[current_student] | default({})) | combine({current_cluster: current_token})
          },
          recursive=True
        )
      }}
  loop: "{{ eks_student_tokens_new_raw.results | default([]) }}"
  vars:
    current_student: "{{ item.item.1 }}"
    current_cluster: "{{ item.item.0.key }}"
    current_token: "{{ item.stdout }}"
  no_log: true
  when:
    - eks_clusters_map | length > 0
    - item.stdout is defined
    - item.stdout | length > 0

- name: Create missing trainer cluster-admin tokens for each EKS cluster
  ansible.builtin.command: >-
    kubectl --kubeconfig {{ eks_admin_kubeconfig_path }}
    --context {{ item.key }}
    -n kube-system
    create token tpcs-cluster-admin --duration=720h
  loop: "{{ eks_clusters_map | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  register: eks_admin_tokens_new_raw
  no_log: true
  when:
    - eks_clusters_map | length > 0
    - eks_force_rotate_tokens or (eks_admin_tokens[item.key] | default('') == '')

- name: Merge newly generated admin tokens into map
  ansible.builtin.set_fact:
    eks_admin_tokens: "{{ eks_admin_tokens | combine({item.item.key: item.stdout}) }}"
  loop: "{{ eks_admin_tokens_new_raw.results | default([]) }}"
  no_log: true
  when:
    - eks_clusters_map | length > 0
    - item.stdout is defined
    - item.stdout | length > 0

- name: Persist token cache on access VM
  ansible.builtin.copy:
    dest: "{{ eks_token_cache_path }}"
    content: "{{ {'student_tokens': eks_student_tokens, 'admin_tokens': eks_admin_tokens} | to_nice_json }}"
    owner: root
    group: root
    mode: '0600'
  no_log: true
  when: eks_clusters_map | length > 0

- name: Publish EKS token maps to localhost facts for student templating
  ansible.builtin.set_fact:
    eks_student_tokens: "{{ eks_student_tokens | default({}) }}"
    eks_admin_tokens: "{{ eks_admin_tokens | default({}) }}"
  delegate_to: localhost
  delegate_facts: true
  become: false
  no_log: true
  when: eks_clusters_map | length > 0
