- name: Ensure cloud-init is done
  command: cloud-init status
  register: cloud_init_result
  until: "'status: done' in cloud_init_result.stdout"
  retries: 30
  delay: 10
  changed_when: false

- name: Install common apt packages
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
    update_cache: true
  loop: "{{ common_apt_packages }}"

- name: Check AWS CLI v2 binary
  ansible.builtin.command: /usr/local/bin/aws --version
  register: common_aws_cli_v2_version
  changed_when: false
  failed_when: false

- name: Install AWS CLI v2
  when: common_aws_cli_v2_version.rc != 0 or 'aws-cli/2.' not in (common_aws_cli_v2_version.stdout ~ common_aws_cli_v2_version.stderr)
  block:
    - name: Download AWS CLI v2 installer
      ansible.builtin.get_url:
        url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
        dest: /tmp/awscliv2.zip
        mode: '0644'

    - name: Extract AWS CLI v2 installer
      ansible.builtin.unarchive:
        src: /tmp/awscliv2.zip
        dest: /tmp
        remote_src: true

    - name: Install or update AWS CLI v2
      ansible.builtin.command: /tmp/aws/install --update
      changed_when: true

- name: Verify AWS CLI v2 installation
  ansible.builtin.command: /usr/local/bin/aws --version
  register: common_aws_cli_v2_verify
  changed_when: false

- name: Install common snap packages
  community.general.snap:
    name: "{{ item.package }}"
    state: present
    classic: "{{ item.classic }}"    # Optionnel : utilisez 'classic' si le package nécessite un confinement classique
  loop: "{{ common_snap_packages }}"

- name: Copy common static custom files
  ansible.builtin.copy:
    src: "{{ item.src_path }}"
    dest: "{{ item.dest_path }}"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ common_custom_files }}"
  when: item.src_path is defined and item.dest_path is defined

- name: Install node exporter (to be able to monitor all vms)
  ansible.builtin.include_tasks:
    file: "node_exporter.yml"

- name: Common Bash scripts # TODO : replace scripts with ansible module
  ansible.builtin.command: bash {{ item.dest_path }}
  become_user: root
  loop: "{{ common_custom_files }}"
  when: item.src_path is defined and item.src_path.endswith('.sh')

- name: Schedule daily shutdown at 8pm
  ansible.builtin.cron:
    name: "Daily shutdown at 8pm"
    minute: "0"
    hour: "20"
    job: "sudo shutdown -h now"

