---

- name: Install apt packages
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
    update_cache: true
  loop: "{{ access_docs_apt_packages }}"

- name: Install snap packages
  community.general.snap:
    name: "{{ item.package }}"
    state: present
    classic: "{{ item.classic }}"
  loop: "{{ access_docs_snap_packages }}"

- name: Ensure this file is deleted
  ansible.builtin.file:
    path: /var/www/html/index.nginx-debian.html
    state: absent

- name: Ensure TP docs directories exist
  ansible.builtin.file:
    path: "/var/www/html/{{ item }}/docs"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop: "{{ access_docs_enabled_tp_names }}"

- name: Create parent directory for custom files
  become_user: "{{ item.owner }}"
  ansible.builtin.file:
    path: "{{ item.dest_path | dirname }}"
    state: directory
    owner: "{{ access_docs_user }}"
    group: "{{ access_docs_user }}"
    mode: '0755'
  loop: "{{ access_docs_custom_files + access_docs_template_files }}"
  when: item.dest_path is defined

- name: Copy static custom files
  become_user: "{{ item.owner }}"
  ansible.builtin.copy:
    src: "{{ item.src_path }}"
    dest: "{{ item.dest_path }}"
    owner: "{{ item.owner }}"
    group: "{{ item.owner }}"
    mode: '0644'
  loop: "{{ access_docs_custom_files }}"
  when: item.src_path is defined and item.dest_path is defined

- name: Create parent directory for template files
  become_user: "{{ item.owner }}"
  ansible.builtin.file:
    path: "{{ item.dest_path | dirname }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.owner }}"
    mode: '0755'
  loop: "{{ access_docs_template_files }}"
  when: item.dest_path is defined

- name: Template and Copy template files
  become_user: "{{ item.owner }}"
  ansible.builtin.template:
    src: "{{ item.src_path }}"
    dest: "{{ item.dest_path }}"
    owner: "{{ item.owner }}"
    group: "{{ item.owner }}"
    mode: '0644'
  loop: "{{ access_docs_template_files }}"
  when:
    - item.src_path is defined
    - item.dest_path is defined
    - item.dest_path != '/etc/nginx/sites-enabled/default'

- name: Template nginx vhost configuration
  become_user: root
  ansible.builtin.template:
    src: access_docs_nginx.conf.j2
    dest: /etc/nginx/sites-enabled/default
    owner: root
    group: root
    mode: '0644'
  notify: Reload nginx

- name: Template TP docs index pages
  ansible.builtin.template:
    src: docs/tp_index.php.j2
    dest: "/var/www/html/{{ access_docs_current_tp_name }}/index.php"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ access_docs_enabled_tp_names }}"
  loop_control:
    loop_var: access_docs_current_tp_name

- name: Refresh TP status fragments now
  ansible.builtin.shell: >-
    php {{ access_docs_init_vms_php_file_dir }} {{ item }} > /var/tmp/{{ item }}_status.html
    && mv /var/tmp/{{ item }}_status.html /var/www/html/{{ item }}/_status.html
  args:
    executable: /bin/bash
  loop: "{{ access_docs_enabled_tp_names }}"

- name: Refresh legacy vms.html now
  ansible.builtin.shell: >-
    php {{ access_docs_init_vms_php_file_dir }} {{ tp_name }} > /var/tmp/vms.html
    && mv /var/tmp/vms.html /var/www/html/vms.html
  args:
    executable: /bin/bash

- name: Create cron job for vms.php script and aws prom exporter
  ansible.builtin.cron:
    name: "{{ item.name }}"
    minute: "*/5"
    user: root
    job: "{{ item.job }}"
  loop:
    - name: "Update aws prom exporter"
      job: "bash {{ access_docs_aws_exporter_script_file }}"

- name: Create cron jobs for TP status fragments
  ansible.builtin.cron:
    name: "Update {{ item }} docs status fragment"
    minute: "*/5"
    user: root
    job: "php {{ access_docs_init_vms_php_file_dir }} {{ item }} > /var/tmp/{{ item }}_status.html && mv /var/tmp/{{ item }}_status.html /var/www/html/{{ item }}/_status.html"
  loop: "{{ access_docs_enabled_tp_names }}"

- name: Remove cron jobs for disabled TP status fragments
  ansible.builtin.cron:
    name: "Update {{ item }} docs status fragment"
    user: root
    state: absent
  loop: "{{ access_docs_gdrive_docs_file_list.keys() | difference(access_docs_enabled_tp_names) | list }}"

- name: Create cron job for legacy vms.html summary
  ansible.builtin.cron:
    name: "Update vms.html summary"
    minute: "*/5"
    user: root
    job: "php {{ access_docs_init_vms_php_file_dir }} {{ tp_name }} > /var/tmp/vms.html && mv /var/tmp/vms.html /var/www/html/vms.html"

- name: Run guacamole docker-compose and configure it with terraform
  ansible.builtin.include_tasks:
    file: "{{ item }}"
  loop:
    - guacamole_docker_compose.yml
    - guacamole_configure_with_terraform.yml

- name: Run monitoring docker-compose
  ansible.builtin.command: docker-compose -f monitoring_docker_compose.yml up -d
  args:
    chdir: "{{ access_docs_monitoring_dir }}"
  become_user: "{{ access_docs_user }}"
  register: docker_compose_monitoring
  changed_when: docker_compose_monitoring.rc == 0

- name: Get SSL certificate with let's encrypt
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ item }}.{{ dns_subdomain }}/fullchain.pem"
  loop: "{{ access_docs_ssl_certificates }}"
  register: acme_certificate_file_stats
  when: acme_certificates_enable | bool

- name: Build list of missing ACME certificates
  ansible.builtin.set_fact:
    access_docs_missing_ssl_certificates: >-
      {{
        acme_certificate_file_stats.results
        | selectattr('stat.exists', 'equalto', false)
        | map(attribute='item')
        | list
      }}
  when: acme_certificates_enable | bool

- name: Get SSL certificate with let's encrypt
  ansible.builtin.command: >-
      certbot --nginx
      -d {{ item }}.{{ dns_subdomain }}
      -d www.{{ item }}.{{ dns_subdomain }}
      --non-interactive --agree-tos
      --no-eff-email
      --no-redirect
      --email 'user@test.com'
  loop: "{{ access_docs_missing_ssl_certificates | default([]) }}"
  register: certbot_result
  changed_when: "'Successfully received certificate' in certbot_result.stdout or 'Congratulations!' in certbot_result.stdout or 'renewed' in certbot_result.stdout"
  failed_when: "certbot_result.rc != 0 and not ('Certificate not yet due for renewal' in certbot_result.stdout or 'Certificate already exists' in certbot_result.stdout_lines | join(' '))"
  when: acme_certificates_enable | bool

- name: Re-read SSL certificate files after certbot
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ item }}.{{ dns_subdomain }}/fullchain.pem"
  loop: "{{ access_docs_ssl_certificates }}"
  register: access_docs_ssl_certificates_after_certbot
  when: acme_certificates_enable | bool

- name: Build list of available ACME certificates
  ansible.builtin.set_fact:
    access_docs_available_ssl_certificates: >-
      {{
        (
          access_docs_ssl_certificates_after_certbot.results
          | default(acme_certificate_file_stats.results, true)
          | default([], true)
        )
        | selectattr('stat.exists', 'equalto', true)
        | map(attribute='item')
        | list
      }}
  when: acme_certificates_enable | bool

- name: Re-template nginx vhost configuration after certbot
  become_user: root
  ansible.builtin.template:
    src: access_docs_nginx.conf.j2
    dest: /etc/nginx/sites-enabled/default
    owner: root
    group: root
    mode: '0644'
  notify: Reload nginx
  when: acme_certificates_enable | bool

- name: Gdrive - template and run python script to copy files from gdrive
  ansible.builtin.include_tasks:
    file: copy_from_gdrive.yml
  loop: "{{ access_docs_enabled_tp_names }}"
  loop_control:
    loop_var: access_docs_current_tp_name
  when: copy_from_gdrive | bool
