---
- name: Ensure JSON directory exists
  ansible.builtin.file:
    path: /var/www/html/json
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Ensure TP docs directories exist
  ansible.builtin.file:
    path: "/var/www/html/{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop: "{{ access_docs_enabled_tp_names }}"

- name: Template EKS clusters JSON for vms.php
  ansible.builtin.template:
    src: eks_clusters.json.j2
    dest: /var/www/html/json/eks_clusters.json
    owner: root
    group: root
    mode: '0644'

- name: Template users JSON for vms.php
  ansible.builtin.template:
    src: users.json.j2
    dest: /var/www/html/json/users.json
    owner: root
    group: root
    mode: '0644'

- name: Template API keys JSON for vms.php (tpiac only)
  ansible.builtin.template:
    src: api_keys.json.j2
    dest: /var/www/html/json/api_keys.json
    owner: root
    group: root
    mode: '0644'
  when: "'tpiac' in access_docs_enabled_tp_names"

- name: Template ECR repos JSON for vms.php
  ansible.builtin.template:
    src: ecr_repos.json.j2
    dest: /var/www/html/json/ecr_repos.json
    owner: root
    group: root
    mode: '0644'

- name: Template vms.php script
  ansible.builtin.template:
    src: vms.php.j2
    dest: "{{ access_docs_init_vms_php_file_dir }}"
    owner: root
    group: root
    mode: '0644'

- name: Refresh TP status fragments now
  ansible.builtin.shell: >-
    php {{ access_docs_init_vms_php_file_dir }} {{ item }} > /var/tmp/{{ item }}_status.html
    && mv /var/tmp/{{ item }}_status.html /var/www/html/{{ item }}/_status.html
  args:
    executable: /bin/bash
  loop: "{{ access_docs_enabled_tp_names }}"

- name: Refresh legacy vms.html now
  ansible.builtin.shell: >-
    php {{ access_docs_init_vms_php_file_dir }} {{ tp_name }} > /var/tmp/vms.html
    && mv /var/tmp/vms.html /var/www/html/vms.html
  args:
    executable: /bin/bash
