
- name: Build list of git repositories for TP
  ansible.builtin.set_fact:
    student_tp_git_repos_raw: "{{ student_enabled_git_repos_raw | default([]) }}"

- name: Initialize effective git repository list for TP
  ansible.builtin.set_fact:
    student_tp_git_repos: []

- name: Apply optional git overrides for TP repositories
  ansible.builtin.set_fact:
    student_tp_git_repos: "{{ student_tp_git_repos + [effective_repo] }}"
  vars:
    branch_override: >-
      {{
        student_git_branch_overrides[item.local_dir]
          | default(student_git_branch_overrides[item.remote_repo], true)
          | default(item.branch, true)
      }}
    remote_override: >-
      {{
        student_git_remote_overrides[item.local_dir]
          | default(student_git_remote_overrides[item.remote_repo], true)
          | default(item.remote_repo, true)
      }}
    effective_repo: "{{ item | combine({'branch': branch_override, 'remote_repo': remote_override}) }}"
  loop: "{{ student_tp_git_repos_raw }}"

- name: If forced (not default), remove existing git directories # Not really idempotent but git clone fails if the directory is not empty
  ansible.builtin.file:
    path: "{{ item.local_dir }}"
    state: absent
  loop: "{{ student_tp_git_repos }}"
  when: student_delete_git_dir | bool

- name: Check whether existing git directories are valid managed clones
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import json
        import os
        import sys

        repo_dir = sys.argv[1]
        expected_remote = sys.argv[2]
        expected_branch = sys.argv[3]
        marker_path = os.path.join(repo_dir, ".tpcs-clone-metadata.json")

        if not os.path.isdir(repo_dir):
            print("missing")
            raise SystemExit(0)

        if not os.path.isfile(marker_path):
            print("reclone")
            raise SystemExit(0)

        with open(marker_path, "r", encoding="utf-8") as handle:
            metadata = json.load(handle)

        if metadata.get("remote_repo") == expected_remote and metadata.get("branch") == expected_branch:
            print("ok")
        else:
            print("reclone")
      - "{{ item.local_dir }}"
      - "{{ item.remote_repo }}"
      - "{{ item.branch }}"
  loop: "{{ student_tp_git_repos }}"
  register: clone_health
  changed_when: false

- name: Remove stale or partial git directories before clone
  ansible.builtin.file:
    path: "{{ item.item.local_dir }}"
    state: absent
  loop: "{{ clone_health.results }}"
  when: item.stdout == "reclone"

- name: Check if git directories already exist after cleanup
  ansible.builtin.stat:
    path: "{{ item.local_dir }}"
  loop: "{{ student_tp_git_repos }}"
  register: rep_stats

- name: Git clone TP remote repositories
  become_user: "{{ ansible_hostname }}"
  ansible.builtin.git:
    dest: "{{ item.item.local_dir }}"
    repo: "{{ item.item.remote_repo }}"
    version: "{{ item.item.branch }}"
  loop: "{{ rep_stats.results }}"
  when: not (item.stat.exists and item.stat.isdir)

- name: Remove .git directories to break dependency with remote repositories
  ansible.builtin.file:
    path: "{{ item.local_dir }}/.git"
    state: absent
  loop: "{{ student_tp_git_repos }}"

- name: Write managed clone metadata for TP repositories
  ansible.builtin.copy:
    dest: "{{ item.local_dir }}/.tpcs-clone-metadata.json"
    content: |
      {
        "remote_repo": "{{ item.remote_repo }}",
        "branch": "{{ item.branch }}"
      }
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"
    mode: "0644"
  loop: "{{ student_tp_git_repos }}"
