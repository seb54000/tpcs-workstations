- name: Wait for microk8s to be ready
  command: "microk8s.status --wait-ready"
  changed_when: false
  register: mk8sstatusout
  failed_when:
      - "'This MicroK8s deployment is acting as a node in a cluster.' not in mk8sstatusout.stdout_lines"
      - mk8sstatusout.rc > 0

- name: Add group microk8s to vm user
  ansible.builtin.user:
    name: vm{{ student_count_number_2digits }}
    groups: microk8s
    append: yes

- name: Install microk8s addons
  include_tasks: microk8s_addons.yml

- name: Remove non-used demoboard docker-compose files
  ansible.builtin.file:
    path: "/home/{{ ansible_hostname }}/tpcs-containers/docker/demoboard/demoboard-source/{{ item }}"
    state: absent
  loop:
    - docker-compose.yml
    - docker-compose.light.yml
    - demoboard-kubernetes-observability.yml

- name: Empty demoboard Dockerfiles by default for TP steps
  ansible.builtin.copy:
    content: ""
    dest: "/home/{{ ansible_hostname }}/tpcs-containers/docker/demoboard/demoboard-source/{{ item }}/Dockerfile"
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"
    mode: "0644"
  loop:
    - api-service
    - frontend-service
    - worker-service

- name: Generate kubectl bash completion file
  ansible.builtin.command: kubectl completion bash
  register: kubectl_completion
  changed_when: false

- name: Install kubectl bash completion system-wide
  ansible.builtin.copy:
    content: "{{ kubectl_completion.stdout }}"
    dest: /etc/bash_completion.d/kubectl
    owner: root
    group: root
    mode: "0644"

- name: Ensure kubectl shortcut alias for student user
  ansible.builtin.lineinfile:
    path: "/home/{{ ansible_hostname }}/.bash_aliases"
    line: "alias k='kubectl'"
    create: true
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"
    mode: "0644"

- name: Ensure kubectl completion for k alias on student bashrc
  ansible.builtin.lineinfile:
    path: "/home/{{ ansible_hostname }}/.bashrc"
    line: "complete -F __start_kubectl k"
    create: true
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"
    mode: "0644"

- name: Ensure student kube directory exists
  ansible.builtin.file:
    path: "/home/{{ ansible_hostname }}/.kube"
    state: directory
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"
    mode: "0700"

- name: Copy microk8s kubeconfig for student user
  ansible.builtin.copy:
    src: /var/snap/microk8s/current/credentials/client.config
    dest: "/home/{{ ansible_hostname }}/.kube/config"
    remote_src: true
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"
    mode: "0600"

- name: Ensure bitnami helm repo is configured for student user
  become_user: "{{ ansible_hostname }}"
  ansible.builtin.command: helm repo add bitnami https://charts.bitnami.com/bitnami
  register: helm_repo_add_bitnami
  changed_when: "'has been added' in helm_repo_add_bitnami.stdout"
  failed_when: >
    helm_repo_add_bitnami.rc != 0 and
    ('already exists' not in ((helm_repo_add_bitnami.stdout | default('')) ~ ' ' ~ (helm_repo_add_bitnami.stderr | default(''))))

- name: Ensure krew binary is installed for student user
  ansible.builtin.stat:
    path: "/home/{{ ansible_hostname }}/.krew/bin/kubectl-krew"
  register: krew_binary

- name: Set temporary directory path for krew install
  ansible.builtin.set_fact:
    krew_tmp_dir_path: "/tmp/krew-{{ ansible_hostname }}"
  when: not krew_binary.stat.exists

- name: Ensure temporary directory for krew install exists and is accessible
  ansible.builtin.file:
    path: "{{ krew_tmp_dir_path }}"
    state: directory
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"
    mode: "0755"
  when: not krew_binary.stat.exists

- name: Download krew archive
  ansible.builtin.get_url:
    url: "https://github.com/kubernetes-sigs/krew/releases/latest/download/krew-linux_amd64.tar.gz"
    dest: "{{ krew_tmp_dir_path }}/krew-linux_amd64.tar.gz"
    mode: "0644"
  when: not krew_binary.stat.exists

- name: Extract krew archive
  ansible.builtin.unarchive:
    src: "{{ krew_tmp_dir_path }}/krew-linux_amd64.tar.gz"
    dest: "{{ krew_tmp_dir_path }}"
    remote_src: true
  when: not krew_binary.stat.exists

- name: Ensure krew installer binary is executable
  ansible.builtin.file:
    path: "{{ krew_tmp_dir_path }}/krew-linux_amd64"
    mode: "0755"
  when: not krew_binary.stat.exists

- name: Install krew for student user
  become_user: "{{ ansible_hostname }}"
  ansible.builtin.command: "{{ krew_tmp_dir_path }}/krew-linux_amd64 install krew"
  environment:
    HOME: "/home/{{ ansible_hostname }}"
  when: not krew_binary.stat.exists

- name: Cleanup temporary directory used for krew install
  ansible.builtin.file:
    path: "{{ krew_tmp_dir_path }}"
    state: absent
  when: not krew_binary.stat.exists

- name: Ensure krew PATH is available for student user
  ansible.builtin.lineinfile:
    path: "/home/{{ ansible_hostname }}/.bashrc"
    line: 'export PATH="$HOME/.krew/bin:$PATH"'
    create: true
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"
    mode: "0644"

- name: Preseed wireshark setuid debconf answer
  ansible.builtin.debconf:
    name: wireshark-common
    question: wireshark-common/install-setuid
    vtype: boolean
    value: "true"

- name: Install wireshark
  ansible.builtin.apt:
    name: wireshark
    state: present
    update_cache: true

- name: Install Java runtime for JMeter
  ansible.builtin.apt:
    name: openjdk-8-jdk
    state: present
    update_cache: true

- name: Download Apache JMeter archive
  ansible.builtin.get_url:
    url: https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.5.tgz
    dest: /tmp/apache-jmeter-5.5.tgz
    mode: "0644"
    force: false

- name: Install Apache JMeter
  ansible.builtin.unarchive:
    src: /tmp/apache-jmeter-5.5.tgz
    dest: /usr/local/bin
    remote_src: true
    owner: root
    group: root
    creates: /usr/local/bin/apache-jmeter-5.5/bin/jmeter

- name: Ensure JMeter PATH is available for student user
  ansible.builtin.lineinfile:
    path: "/home/{{ ansible_hostname }}/.bashrc"
    line: 'export PATH="/usr/local/bin/apache-jmeter-5.5/bin:$PATH"'
    create: true
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"
    mode: "0644"

- name: Ensure hidden helper directory exists for TP smoke tests
  ansible.builtin.file:
    path: /home/{{ ansible_hostname }}/.tpcs-tools/bin
    state: directory
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"
    mode: '0700'
  when: (tf_vars.eks_clusters.value | default({}) | length) > 0

- name: Install demoboard smoke test script for TP kube
  ansible.builtin.template:
    src: common/tpkube_demoboard_smoke_test.sh.j2
    dest: /home/{{ ansible_hostname }}/.tpcs-tools/bin/demoboard-smoke-test.sh
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"
    mode: '0700'
  when: (tf_vars.eks_clusters.value | default({}) | length) > 0
