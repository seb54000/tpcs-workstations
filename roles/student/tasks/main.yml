---

# tasks file for vms student
- name: Assert requested TP names are supported
  ansible.builtin.assert:
    that:
      - (tp_names | default([tp_name]) | difference(student_tp_vars.keys() | list) | length) == 0
    fail_msg: "Unsupported TP name in tp_names={{ tp_names | default([tp_name]) }}. Supported values are {{ student_tp_vars.keys() | list | sort }}."

- name: Initialize enabled TP aggregate variables
  ansible.builtin.set_fact:
    student_enabled_tp_names: "{{ tp_names | default([tp_name]) }}"
    student_enabled_snap_packages: []
    student_enabled_template_files: []
    student_enabled_vscode_extensions: []
    student_enabled_git_repos_raw: []

- name: Build enabled TP aggregate variables
  ansible.builtin.set_fact:
    student_enabled_snap_packages: "{{ student_enabled_snap_packages + (student_tp_vars[item].snap_packages | default([])) }}"
    student_enabled_template_files: "{{ student_enabled_template_files + (student_tp_vars[item].template_files | default([])) }}"
    student_enabled_vscode_extensions: "{{ student_enabled_vscode_extensions + (student_tp_vars[item].vscode_extensions | default([])) }}"
    student_enabled_git_repos_raw: >-
      {{
        student_enabled_git_repos_raw
        +
        (
          student_tp_vars[item].git_repos
            | default((student_tp_vars[item].git is defined) | ternary([student_tp_vars[item].git], []), true)
        )
      }}
  loop: "{{ student_enabled_tp_names }}"

- name: Normalize enabled TP aggregate variables
  ansible.builtin.set_fact:
    student_enabled_vscode_extensions: "{{ student_enabled_vscode_extensions | unique }}"
    student_vscode_primary_repo_dir: "{{ (student_enabled_git_repos_raw | first).local_dir | default('/home/' ~ ansible_hostname, true) }}"

- name: Authorize password authentication SSH
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication\s+no'
    line: 'PasswordAuthentication yes'
    state: present
    backrefs: yes
  notify: Restart sshd

- name: Restart sshd immediately if we want to connect before end of playbook
  meta: flush_handlers

- name: Install vm student apt packages
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
    update_cache: true
  loop: "{{ student_common_apt_packages }}"

- name: Install vm student snap packages
  community.general.snap:
    name: "{{ item.package }}"
    state: present
    classic: "{{ item.classic }}"
  loop: "{{ student_common_snap_packages + student_enabled_snap_packages }}"

- name: Add group ssl-cert to xrdp user
  ansible.builtin.user:
    name: xrdp
    groups: ssl-cert
    append: yes
  when: acme_certificates_enable | bool

- name: Add group docker to vm user
  ansible.builtin.user:
    name: vm{{ student_count_number_2digits }}
    groups: docker
    append: yes

- name: Create parent directory for student static and template files
  ansible.builtin.file:
    path: "{{ item.dest_path | dirname }}"
    state: directory
    owner: "{{ ansible_hostname }}"
    mode: '0755'
  loop: "{{ student_enabled_template_files + student_common_custom_files + student_common_template_files }}"

- name: Copy static custom files
  become_user: "{{ item.owner }}"
  ansible.builtin.copy:
    src: "{{ item.src_path }}"
    dest: "{{ item.dest_path }}"
    owner: "{{ item.owner }}"
    group: "{{ item.owner }}"
    mode: '0644'
  loop: "{{ student_common_custom_files }}"

- name: Template and Copy student template files (either for tpiac, tpkube or tpmon)
  ansible.builtin.template:
    src: "{{ item.src_path }}"
    dest: "{{ item.dest_path }}"
    owner: "{{ item.owner }}"
    group: "{{ item.owner }}"
    mode: "{{ item.mode | default('0644') }}"
  loop: "{{ student_enabled_template_files + student_common_template_files }}"

- name: Generate self signed SSL certificate for XRDP # Tried to use community.crypto.x509_certificate ansible module but not easy to setup subject (need to create a csr file ?)
  ansible.builtin.command: >-
    openssl req -x509 -sha384
    -newkey rsa:3072 -nodes
    -keyout /etc/xrdp/key.pem
    -out /etc/xrdp/cert.pem
    -days 365
    -subj "/C=US/ST=Denial/L=Springfield/O=Dis/CN=www.example.com"
  args:
    creates: /etc/xrdp/key.pem

- name: Manage xfce browser shortcut to use chromium
  ansible.builtin.lineinfile:
    path: /usr/share/applications/xfce4-web-browser.desktop
    regexp: 'Exec.*'
    line: 'Exec=chromium'
    backrefs: yes
    state: present

- name: Remove legacy automatic tpiac environment sourcing block from .bashrc
  ansible.builtin.blockinfile:
    path: "/home/{{ ansible_hostname }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - TPIAC environment"
    state: absent
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"

- name: Remove legacy automatic tpiac environment sourcing line from .bashrc
  ansible.builtin.lineinfile:
    path: "/home/{{ ansible_hostname }}/.bashrc"
    regexp: '^source /home/{{ ansible_hostname }}/tpcs-iac/.env$'
    state: absent
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"

- name: Install vscode extensions
  become_user: "{{ ansible_hostname }}"
  ansible.builtin.command: code --install-extension {{ item }}
  loop: "{{ student_enabled_vscode_extensions }}"
  register: result
  changed_when: "'is already installed' not in result.stdout"

- name: Git clone repository for enabled TPs
  ansible.builtin.include_tasks:
    file: "git_clone.yml"

- name: Run specific tasks needed for enabled TPs
  ansible.builtin.include_tasks:
    file: "{{ student_current_tp_name }}.yml"
  loop: "{{ student_enabled_tp_names }}"
  loop_control:
    loop_var: student_current_tp_name

- name: Configure EKS/ECR access files and aliases
  ansible.builtin.include_tasks:
    file: eks.yml
