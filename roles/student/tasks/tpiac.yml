- name: Ensure .aws directory exists for TP IaC default profile
  ansible.builtin.file:
    path: "/home/{{ ansible_hostname }}/.aws"
    state: directory
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"
    mode: "0700"

- name: Configure default AWS credentials profile for TP IaC
  ansible.builtin.blockinfile:
    path: "/home/{{ ansible_hostname }}/.aws/credentials"
    create: true
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"
    mode: "0600"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - TPIAC default profile"
    block: |
      [default]
      aws_access_key_id = {{ student_tp_vars.tpiac.aws.access_key }}
      aws_secret_access_key = {{ student_tp_vars.tpiac.aws.secret_key }}
  no_log: true

- name: Configure default AWS config profile for TP IaC
  ansible.builtin.blockinfile:
    path: "/home/{{ ansible_hostname }}/.aws/config"
    create: true
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"
    mode: "0600"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - TPIAC default profile"
    block: |
      [default]
      region = {{ student_tp_vars.tpiac.aws.region_for_apikey }}
      output = json

- name: Setup SSH key for TF and Ansible environment
  ansible.builtin.openssh_keypair:
    path: /home/{{ ansible_hostname }}/tpcs-iac/demoboard/terraform/tp-iac
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"

- name: Read TP IaC public SSH key for Terraform variables
  ansible.builtin.slurp:
    src: /home/{{ ansible_hostname }}/tpcs-iac/demoboard/terraform/tp-iac.pub
  register: tpiac_public_key_raw

- name: Write TP IaC Terraform auto variables
  ansible.builtin.copy:
    dest: /home/{{ ansible_hostname }}/tpcs-iac/demoboard/terraform/tpiac.auto.tfvars
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"
    mode: "0644"
    content: |
      ssh_key_public = {{ (tpiac_public_key_raw.content | b64decode | trim) | to_json }}
      demoboard_aws_zones = [
        "{{ student_tp_vars.tpiac.aws.region_for_apikey }}a",
        "{{ student_tp_vars.tpiac.aws.region_for_apikey }}b",
        "{{ student_tp_vars.tpiac.aws.region_for_apikey }}c"
      ]

- name: Template TP IaC environment memo file
  ansible.builtin.template:
    src: "tpiac/.env.j2"
    dest: "/home/{{ ansible_hostname }}/tpcs-iac/.env"
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"
    mode: '0644'

- name: Remove non-used demoboard docker-compose files for tpiac
  ansible.builtin.file:
    path: "/home/{{ ansible_hostname }}/tpcs-iac/demoboard/ansible/demoboard-source/{{ item }}"
    state: absent
  loop:
    - docker-compose.yml
    - docker-compose.light.yml
    - demoboard-kubernetes-observability.yml
    - demoboard-kubernetes-observability-scaled.yml

- name: Ensure explicit tpiac environment helper exists in .bashrc
  ansible.builtin.blockinfile:
    path: "/home/{{ ansible_hostname }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - TPIAC environment helper"
    block: |
      tpiac_env() {
        source /home/{{ ansible_hostname }}/tpcs-iac/.env
        echo "TP IaC compatibility variables loaded from /home/{{ ansible_hostname }}/tpcs-iac/.env"
        echo "AWS credentials are configured in the default AWS CLI profile."
      }
      alias tpiac-env=tpiac_env
    insertafter: EOF
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"

- name: Replace vm00 with {{ ansible_hostname }} in aws_ec2.yml
  ansible.builtin.replace:
    path: /home/{{ ansible_hostname }}/tpcs-iac/demoboard/ansible/aws_ec2.yml
    regexp: 'vm00'
    replace: "{{ ansible_hostname }}"

- name: Replace region in aws_ec2.yml
  ansible.builtin.replace:
    path: /home/{{ ansible_hostname }}/tpcs-iac/demoboard/ansible/aws_ec2.yml
    regexp: 'eu-west-3'
    replace: "{{ student_tp_vars.tpiac.aws.region_for_apikey }}"

- name: Replace AMI ID in variables.tf
  ansible.builtin.replace:
    path: /home/{{ ansible_hostname }}/tpcs-iac/demoboard/terraform/variables.tf
    regexp: 'ami-0ec59e7bad062131f'
    replace: "{{ student_tp_vars.tpiac.aws.ami_id }}"


- name: Create list of files (with find) to replace AMI ID (in terraform files)
  # Previous model using with_fileglob is not working as this execute on the ansible controller...
  ansible.builtin.find:
    paths: "/home/{{ ansible_hostname }}/tpcs-iac/terraform"
  register: terraform_files

- name: Replace AMI ID in all terraform files
  ansible.builtin.replace:
    path: "{{ item.path }}"
    regexp: '<AMI-ID-for-your-region>'
    replace: "{{ student_tp_vars.tpiac.aws.ami_id }}"
  loop: "{{ terraform_files.files }}"

- name: Download Terraform
  ansible.builtin.get_url:
    url: "https://releases.hashicorp.com/terraform/1.13.1/terraform_1.13.1_linux_amd64.zip"
    dest: /tmp/terraform.zip
    mode: '0644'
  register: terraform_download

- name: Create Terraform installation directory
  ansible.builtin.file:
    path: /usr/local/bin
    state: directory
    mode: '0755'

- name: Extract Terraform binary
  ansible.builtin.unarchive:
    src: /tmp/terraform.zip
    dest: /usr/local/bin
    remote_src: yes
    mode: '0755'
    owner: root
    group: root

- name: Clean up Terraform archive
  ansible.builtin.file:
    path: /tmp/terraform.zip
    state: absent
  when: terraform_download.changed

- name: Verify Terraform installation
  become_user: "{{ ansible_hostname }}"
  ansible.builtin.command: terraform --version
  changed_when: false

- name: Add Ansible PPA repository
  ansible.builtin.apt_repository:
    repo: ppa:ansible/ansible
    state: present

- name: Update apt package index
  ansible.builtin.apt:
    update_cache: yes

- name: Install TP IaC system packages
  ansible.builtin.apt:
    name:
      - ansible
      - jq
      - python3-pip
      - python3-venv
      - rsync
    state: present
    update_cache: yes

- name: Verify Ansible installation
  become_user: "{{ ansible_hostname }}"
  ansible.builtin.command: ansible --version
  changed_when: false

- name: Ensure hidden helper directory exists for TP IaC tests
  ansible.builtin.file:
    path: /home/{{ ansible_hostname }}/.tpcs-tools/bin
    state: directory
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"
    mode: '0700'

- name: Install demoboard deploy test script for TP IaC
  ansible.builtin.template:
    src: tpiac/tpiac_demoboard_deploy_test.sh.j2
    dest: /home/{{ ansible_hostname }}/.tpcs-tools/bin/tpiac-demoboard-deploy-test.sh
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"
    mode: '0700'
