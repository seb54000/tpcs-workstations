- name: Stop node exporter for first part of the work
  become: true
  ansible.builtin.systemd_service:
    state: stopped
    name: "node_exporter.service"

- name: Preseed wireshark setuid debconf answer
  ansible.builtin.debconf:
    name: wireshark-common
    question: wireshark-common/install-setuid
    vtype: boolean
    value: "true"

- name: Install wireshark
  ansible.builtin.apt:
    name: wireshark
    state: present
    update_cache: true

- name: Install Java runtime for JMeter
  ansible.builtin.apt:
    name: openjdk-8-jdk
    state: present
    update_cache: true

- name: Download Apache JMeter archive
  ansible.builtin.get_url:
    url: https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.5.tgz
    dest: /tmp/apache-jmeter-5.5.tgz
    mode: "0644"
    force: false

- name: Install Apache JMeter
  ansible.builtin.unarchive:
    src: /tmp/apache-jmeter-5.5.tgz
    dest: /usr/local/bin
    remote_src: true
    owner: root
    group: root
    creates: /usr/local/bin/apache-jmeter-5.5/bin/jmeter

- name: Ensure JMeter PATH is available for student user
  ansible.builtin.lineinfile:
    path: "/home/{{ ansible_hostname }}/.bashrc"
    line: 'export PATH="/usr/local/bin/apache-jmeter-5.5/bin:$PATH"'
    create: true
    owner: "{{ ansible_hostname }}"
    group: "{{ ansible_hostname }}"
    mode: "0644"
