---
# common (for tp_name) vars file for vms student


# Set to true in extra vars when you want to delete/recreate git directory (ansible-playbook post_install.yml -e student_delete_git_dir=true)
# WARNING : DATA created by student in this directory will be lost
student_delete_git_dir: false

# Optional per-repository overrides used by roles/student/tasks/git_clone.yml.
# Keys can be either the repository local_dir or remote_repo.
# Example:
# student_git_branch_overrides:
#   /home/vm00/tp-cs-monitoring-student: feature/my-branch
#   https://github.com/seb54000/tpcs-demoboard.git: observability-lab
student_git_branch_overrides: {}
student_git_remote_overrides: {}

student_count_number_2digits: "{{ ansible_hostname[-2:] }}"

student_common_apt_packages:
  - xrdp
  - xfce4
  - util-linux # provides nsenter on Ubuntu

student_common_snap_packages :
  - package: postman
    classic: false
  - package: insomnia
    classic: false
  - package: helm
    classic: true
  - package: chromium
    classic: false
  - package: code
    classic: true

student_common_custom_files:
  - src_path: common/autorefresh.json
    dest_path: "/var/snap/chromium/current/policies/managed/autorefresh.json"
    owner: root
  - src_path: common/mateterminal.desktop
    dest_path: /home/{{ ansible_hostname }}/.config/autostart/mateterminal.desktop
    owner: root
  - src_path: common/chromium.desktop
    dest_path: /home/{{ ansible_hostname }}/.config/autostart/mateterminal.desktop
    owner: root
  - src_path: common/student_allow_color
    dest_path: /etc/polkit-1/localauthority/50-local.d/45-allow-colord.pkla
    owner: root

student_common_template_files:
  - src_path: common/vscode.desktop.j2
    dest_path: /home/{{ ansible_hostname }}/.config/autostart/vscode.desktop
    owner: root

student_eks_template_files:
  - src_path: common/kubeconfig_eks_student.yaml.j2
    dest_path: /home/{{ ansible_hostname }}/.kube/config.eks
    owner: "{{ ansible_hostname }}"
  - src_path: common/kubeconfig_eks_admin.yaml.j2
    dest_path: /home/{{ ansible_hostname }}/.kube/config.eks.admin
    owner: "{{ ansible_hostname }}"
  - src_path: common/eks_access_info.txt.j2
    dest_path: /home/{{ ansible_hostname }}/.kube/eks_access_info.txt
    owner: "{{ ansible_hostname }}"
  - src_path: common/ecr_access_info.txt.j2
    dest_path: /home/{{ ansible_hostname }}/.kube/ecr_access_info.txt
    owner: "{{ ansible_hostname }}"
  - src_path: common/docker_config_ecr.json.j2
    dest_path: /home/{{ ansible_hostname }}/.docker/config.json
    owner: "{{ ansible_hostname }}"

student_tp_vars:
  tpmon:
    snap_packages:
      - package: kubectl
        classic: true
    vscode_extensions:
      - pomdtr.excalidraw-editor
    git_repos:
      - local_dir: /home/{{ ansible_hostname }}/tp-cs-monitoring-student
        remote_repo: https://github.com/seb54000/tp-cs-monitoring-student.git
        branch: main
      - local_dir: /home/{{ ansible_hostname }}/tp-cs-monitoring-student/04-opentelemetry
        remote_repo: https://github.com/open-telemetry/opentelemetry-demo.git
        branch: main
      - local_dir: /home/{{ ansible_hostname }}/tp-cs-monitoring-student/03-demoboard/demoboard-source
        remote_repo: https://github.com/seb54000/tpcs-demoboard.git
        branch: main
    template_files:
      - src_path: tpmon/eks_demoboard_monitoring_lgtm.sh.j2
        dest_path: /home/{{ ansible_hostname }}/tpmon_eks_demoboard_monitoring_lgtm.sh
        owner: "{{ ansible_hostname }}"
        mode: "0700"
      - src_path: tpmon/refresh_grafana_lgtm.sh.j2
        dest_path: /home/{{ ansible_hostname }}/refresh_grafana_lgtm.sh
        owner: "{{ ansible_hostname }}"
        mode: "0700"
  tpiac:
    snap_packages: []
    template_files:
      - src_path: tpiac/config.j2
        dest_path: /home/{{ ansible_hostname }}/.aws/config
        owner: "{{ ansible_hostname }}"
      - src_path: tpiac/credentials.j2
        dest_path: /home/{{ ansible_hostname }}/.aws/credentials
        owner: "{{ ansible_hostname }}"
    vscode_extensions:
      - redhat.vscode-yaml
      - redhat.ansible
      - hashicorp.terraform
      - pomdtr.excalidraw-editor
    git_repos:
      - local_dir: /home/{{ ansible_hostname }}/tpcs-iac
        remote_repo: https://github.com/seb54000/tpcs-iac.git
        branch: main
      - local_dir: /home/{{ ansible_hostname }}/tpcs-iac/demoboard/ansible/demoboard-source
        remote_repo: https://github.com/seb54000/tpcs-demoboard.git
        branch: main
    aws:
      region_for_apikey: "{{ tf_vars.tpiac_users.value[ student_count_number_2digits | int ].tpiac_region_list_for_apikey | default()}}"
      access_key: "{{ tf_vars.tpiac_users.value[ student_count_number_2digits | int ].user_apikey | default() }}"
      secret_key: "{{ tf_vars.tpiac_users.value[ student_count_number_2digits | int ].user_apikey_secret | default() }}"
      ami_id: "{{ student_tpiac_ami_for_template_with_regions_list[(student_count_number_2digits | int) % (student_tpiac_ami_for_template_with_regions_list | length)] | default() }}"
  tpkube:
    snap_packages:
      - package: microk8s
        classic: true
      - package: kubectl
        classic: true
      - package: k9s
        classic: false
    template_files: []
    vscode_extensions:
      - ms-kubernetes-tools.vscode-kubernetes-tools
      - ms-azuretools.vscode-docker
      - pomdtr.excalidraw-editor
    git_repos:
      - local_dir: /home/{{ ansible_hostname }}/tpcs-containers
        remote_repo: https://github.com/seb54000/tp-cs-containers-student.git
        branch: main
      - local_dir: /home/{{ ansible_hostname }}/tpcs-containers/docker/demoboard/demoboard-source
        remote_repo: https://github.com/seb54000/tpcs-demoboard.git
        branch: main
    microk8s_addons:
      - dns
      - ingress
      - registry
      - hostpath-storage

student_tpiac_ami_for_template_with_regions_list: # Cannot be part of student_tp_vars variable
  # List done with https://cloud-images.ubuntu.com/locator/ec2/ Noble 24.04 + amd64
  - ami-0c4059cd09929aebe #"eu-central-1"
  - ami-0b0087db031e71474 #"eu-west-1"
  - ami-0d3b447228dab952e #"eu-west-2"
  - ami-061bdb40c12e7d8f1 #"eu-south-1"
  # "eu-west-3", //We keep Paris for guacamole VMs
  - ami-0a60eeae18abc601 #"eu-south-2"
  - ami-0dc1ddd4917dcf47a #"eu-north-1"
  - ami-08946bcde99d2248b #"eu-central-2"
